<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>The Real Couple: Tournament Edition</title>
    <style>
        :root {
            --neon-pink: #ff2e63;
            --neon-teal: #08f7fe;
            --dark-bg: #1a1a2e;
            --card-bg: rgba(255, 255, 255, 0.1);
            --yellow-theme: #f9d71c;
            --correct-green: #00ff88;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: radial-gradient(circle at center, #16213e 0%, #0f3460 100%);
            color: white; margin: 0; height: 100vh;
            display: flex; align-items: center; justify-content: center; overflow: hidden;
        }

        #ui-wrapper { display: flex; gap: 30px; align-items: flex-start; }

        .sidebar {
            background: var(--card-bg); padding: 20px; border-radius: 20px;
            width: 180px; border: 1px solid rgba(255,255,255,0.1);
        }

        .ep-tab { padding: 10px; margin-bottom: 5px; border-radius: 8px; opacity: 0.3; background: rgba(0,0,0,0.3); }
        .ep-tab.active { opacity: 1; border: 1px solid var(--neon-teal); box-shadow: 0 0 10px var(--neon-teal); }
        .ep-tab.done { opacity: 1; color: var(--correct-green); }

        .game-container {
            background: var(--card-bg); backdrop-filter: blur(10px);
            padding: 20px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1);
            width: 480px; min-height: 500px; display: flex; flex-direction: column; gap: 8px;
        }

        .row {
            display: flex; justify-content: space-between; padding: 6px;
            border-radius: 12px; transition: 0.3s; border: 2px solid transparent;
            background: rgba(255,255,255,0.05); position: relative; gap: 10px;
        }

        .row.locked-row { background: rgba(255, 46, 99, 0.4); border-color: var(--neon-pink); }
        
        .person-card { 
            display: flex; align-items: center; padding: 8px; border-radius: 10px; 
            width: 195px; background: rgba(0,0,0,0.3); cursor: grab; border: 1.5px solid var(--neon-teal);
        }
        
        .avatar { width: 30px; height: 30px; border-radius: 8px; margin-right: 10px; background: var(--yellow-theme); pointer-events: none; }
        .person-card span { pointer-events: none; font-size: 13px; }

        .controls { margin-top: 15px; text-align: center; }
        button { padding: 12px 30px; font-size: 14px; font-weight: bold; text-transform: uppercase; cursor: pointer; border: none; border-radius: 50px; }
        #main-btn { background: var(--neon-teal); color: #1a1a2e; }

        #start-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 100;
        }

        .explosion-particle { position: absolute; width: 6px; height: 6px; border-radius: 50%; pointer-events: none; animation: fly 0.8s forwards; }
        @keyframes fly { to { transform: translate(var(--x), var(--y)); opacity: 0; } }
    </style>
</head>
<body>

<div id="start-overlay" onclick="initGame()">
    <h1 style="color: var(--neon-teal); letter-spacing: 5px;">THE REAL COUPLE</h1>
    <p>5 EPISODES. 16 PEOPLE. ONE MISTAKE ENDS IT ALL.</p>
    <button style="background: var(--neon-pink); color: white; padding: 20px 50px; font-size: 22px;">START SEASON</button>
</div>

<div id="ui-wrapper">
    <div class="sidebar" id="sidebar">
        <h3 style="margin-top:0">Season Progress</h3>
        <div id="ep1" class="ep-tab">Episode 1</div>
        <div id="ep2" class="ep-tab">Episode 2</div>
        <div id="ep3" class="ep-tab">Episode 3</div>
        <div id="ep4" class="ep-tab">Episode 4</div>
        <div id="ep5" class="ep-tab">Episode 5</div>
    </div>

    <div class="main-area">
        <div class="game-container" id="game-board"></div>
        <div class="controls">
            <p id="guess-count">Guesses: 3 remaining</p>
            <button id="main-btn" onclick="handleAction()">Check Pairs</button>
            <div id="feedback" style="margin-top:10px"></div>
        </div>
    </div>
</div>

<script>
    const bgMusic = new Audio('jazz.mp3'); bgMusic.loop = true;
    let audioCtx;
    
    // THE POOL: 8 Real Couples
    const allCouples = [
        ["Damon", "Lucy"], ["Will", "Rob"], ["Anjeli", "Brian"], ["Claire", "Bob"],
        ["Ryan", "Barry"], ["Katie", "Jane"], ["Sam", "Alex"], ["Chris", "Pat"]
    ];

    let currentEpisode = 1;
    let activePlayers = []; // Those currently on screen
    let waitingPlayers = []; // Those yet to enter
    let foundCouples = [];
    let guessesInEpisode = 0;
    let lockedIndex = null;

    function initGame() {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        bgMusic.play();
        document.getElementById('start-overlay').style.display = 'none';
        
        // Setup Episode 1: 10 people (5 rows)
        // 4 real couples + 2 singles (whose partners are in waiting)
        const shuffledCouples = [...allCouples].sort(() => Math.random() - 0.5);
        
        const ep1Couples = shuffledCouples.slice(0, 4); // 8 people
        const singlesHolders = shuffledCouples.slice(4, 6); // 4 people (we take 1 from each)
        const inWings = shuffledCouples.slice(6); // 4 people (waiting for later)

        activePlayers = [...ep1Couples.flat(), singlesHolders[0][0], singlesHolders[1][0]];
        waitingPlayers = [singlesHolders[0][1], singlesHolders[1][1], ...inWings.flat()];
        
        startEpisode();
    }

    function startEpisode() {
        guessesInEpisode = 0;
        lockedIndex = null;
        activePlayers.sort(() => Math.random() - 0.5);
        
        // Update Sidebar
        document.querySelectorAll('.ep-tab').forEach(t => t.classList.remove('active'));
        document.getElementById(`ep${currentEpisode}`).classList.add('active');
        
        document.getElementById('main-btn').innerText = "Check Pairs";
        document.getElementById('main-btn').disabled = false;
        
        renderBoard();
        updateFeedback();
    }

    function renderBoard() {
        const board = document.getElementById('game-board');
        board.innerHTML = '';
        const rowCount = activePlayers.length / 2;
        
        for (let i = 0; i < rowCount; i++) {
            const p1 = activePlayers[i * 2];
            const p2 = activePlayers[i * 2 + 1];
            const isLocked = (lockedIndex === i);

            board.innerHTML += `
                <div class="row ${isLocked ? 'locked-row' : ''}" id="row-${i}" ondblclick="handleLock(${i})">
                    <div class="person-card" id="card-${i * 2}" draggable="${guessesInEpisode < 2}" ondragstart="drag(e)" ondragover="allowDrop(e)" ondrop="drop(e)">
                        <img src="https://api.dicebear.com/7.x/bottts/svg?seed=${p1}&backgroundColor=f9d71c" class="avatar">
                        <span>${p1}</span>
                    </div>
                    <div class="person-card" id="card-${i * 2 + 1}" draggable="${guessesInEpisode < 2}" ondragstart="drag(e)" ondragover="allowDrop(e)" ondrop="drop(e)">
                        <img src="https://api.dicebear.com/7.x/bottts/svg?seed=${p2}&backgroundColor=f9d71c" class="avatar">
                        <span>${p2}</span>
                    </div>
                </div>`;
        }
        setupDragEvents();
    }

    function updateFeedback() {
        let realInGame = 0;
        for(let i=0; i<activePlayers.length/2; i++) {
            if(isRealPair(activePlayers[i*2], activePlayers[i*2+1])) realInGame++;
        }
        document.getElementById('feedback').innerText = `Episode ${currentEpisode}: There are hidden real couples on screen.`;
        document.getElementById('guess-count').innerText = `Guesses: ${3 - guessesInEpisode} remaining`;
    }

    function handleAction() {
        if (guessesInEpisode < 2) {
            guessesInEpisode++;
            let currentCorrect = 0;
            for(let i=0; i<activePlayers.length/2; i++) {
                if(isRealPair(activePlayers[i*2], activePlayers[i*2+1])) currentCorrect++;
            }
            document.getElementById('feedback').innerText = `Result: ${currentCorrect} correct couples found.`;
            if(guessesInEpisode === 2) {
                document.getElementById('main-btn').innerText = "LOCK & REVEAL";
                document.getElementById('feedback').innerText = `Final Chance! You have ${currentCorrect} correct. Double-click a row to lock one in.`;
            }
            document.getElementById('guess-count').innerText = `Guesses: ${3 - guessesInEpisode} remaining`;
        } else {
            if(lockedIndex === null) { alert("Double-click a row to lock it!"); return; }
            processReveal();
        }
    }

    function processReveal() {
        const p1 = activePlayers[lockedIndex * 2];
        const p2 = activePlayers[lockedIndex * 2 + 1];
        
        if (isRealPair(p1, p2)) {
            // WIN EPISODE
            document.getElementById(`ep${currentEpisode}`).classList.add('done');
            if (currentEpisode < 5) {
                alert(`SUCCESS! ${p1} & ${p2} are a real couple! Moving to Episode ${currentEpisode + 1}`);
                // Eliminate the found couple
                activePlayers = activePlayers.filter(p => p !== p1 && p !== p2);
                // Add 2 from waiting
                if(waitingPlayers.length > 0) {
                    activePlayers.push(waitingPlayers.shift());
                    activePlayers.push(waitingPlayers.shift());
                }
                currentEpisode++;
                startEpisode();
            } else {
                alert("CONGRATULATIONS! You cleared the whole season!");
                location.reload();
            }
        } else {
            // LOSE GAME
            alert(`GAME OVER! ${p1} & ${p2} are NOT a real couple. The season ends here.`);
            location.reload();
        }
    }

    function isRealPair(n1, n2) {
        return allCouples.some(p => (p[0] === n1 && p[1] === n2) || (p[0] === n2 && p[1] === n1));
    }

    function handleLock(i) {
        if(guessesInEpisode === 2) { lockedIndex = i; renderBoard(); }
    }

    // Drag Logic (Standardized)
    function setupDragEvents() {
        document.querySelectorAll('.person-card').forEach(card => {
            card.addEventListener('dragstart', (e) => { e.dataTransfer.setData('text', e.target.id); });
            card.addEventListener('dragover', (e) => e.preventDefault());
            card.addEventListener('drop', (e) => {
                e.preventDefault();
                const sourceId = e.dataTransfer.getData('text');
                const sIdx = parseInt(sourceId.split('-')[1]);
                const tIdx = parseInt(e.target.closest('.person-card').id.split('-')[1]);
                [activePlayers[sIdx], activePlayers[tIdx]] = [activePlayers[tIdx], activePlayers[sIdx]];
                renderBoard();
            });
        });
    }
</script>
</body>
</html>
